<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Cleaner</title>
<style>
body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
textarea { width: 100%; height: 150px; margin-bottom: 10px; }
button { padding: 10px; margin: 5px; }
.pro { background: black; color: white; }
</style>
</head>
<body>

<h1>Remove Extra Spaces from Text Online (Free Tool)</h1>
<p>Quickly remove extra spaces, fix formatting, and clean your text online.</p>
<textarea id="input" placeholder="Paste text here..."></textarea>
<p id="counter">0 / 200</p>

<button id="cleanBtn">Clean Text</button>
<button id="upperBtn">UPPERCASE</button>

<h3>Result:</h3>
<textarea id="output"></textarea>

<br><br>

<p><b>Limit reached fast?</b> Free version is only 200 characters. Unlock PRO for unlimited text cleaning.</p>
<button class="pro" onclick="goPay()">Unlock PRO ($5)</button>

<script>
let attempts = 0;

const input = document.getElementById("input");
const output = document.getElementById("output");
const counter = document.getElementById("counter");

// счётчик символов
input.addEventListener("input", function() {
  let length = input.value.length;
  counter.innerText = length + " / 200";
});

// очистка текста
document.getElementById("cleanBtn").addEventListener("click", function() {
  let text = input.value;

  attempts++;

  if (attempts > 3) {
    if (confirm("Free attempts finished. Go PRO?")) {
      goPay();
    }
    return;
  }

  if (text.length > 200) {
    if (confirm("Limit reached. Unlock PRO for unlimited access?")) {
      goPay();
    }
    return;
  }

  text = text.replace(/\s+/g, ' ').trim();
  output.value = text;
});

// uppercase
document.getElementById("upperBtn").addEventListener("click", function() {
  let text = input.value;

  attempts++;

  if (attempts > 3) {
    if (confirm("Free attempts finished. Go PRO?")) {
      goPay();
    }
    return;
  }

  if (text.length > 200) {
    if (confirm("Limit reached. Unlock PRO for unlimited access?")) {
      goPay();
    }
    return;
  }

  output.value = text.toUpperCase();
});

// переход на оплату
function goPay() {
  window.location.href = "https://tishka3.gumroad.com/l/zebvt";
}
</script>

</body>
</html>
