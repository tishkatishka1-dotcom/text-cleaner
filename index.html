<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Text Cleaner</title>
<style>
body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
textarea { width: 100%; height: 150px; margin-bottom: 10px; }
button { padding: 10px; margin: 5px; }
.pro { background: black; color: white; }
</style>
</head>
<body>

<h1>Text Cleaner</h1>

<textarea id="input" placeholder="Paste text here..."></textarea>
<p id="counter">0 / 200</p>
<button onclick="cleanText()">Clean Text</button>
<button onclick="makeUpper()">UPPERCASE</button>

<h3>Result:</h3>
<textarea id="output"></textarea>

<br><br>

<p><b>Limit reached fast?</b> Free version is only 200 characters. Unlock PRO for unlimited text cleaning.</p>
<button class="pro" onclick="goPay()">Unlock PRO ($5)</button>

<script>
function cleanText() {
  let text = document.getElementById("input").value;

  if (text.length > 200) {
    alert("Free version limit: 200 characters. Unlock PRO for unlimited.");
    return;
  }

  text = text.replace(/\s+/g, ' ').trim();
  document.getElementById("output").value = text;
}

function makeUpper() {
  let text = document.getElementById("input").value;

  if (text.length > 200) {
    alert("Free version limit: 200 characters. Unlock PRO for unlimited.");
    return;
  }

  document.getElementById("output").value = text.toUpperCase();
}

function goPay() {
  window.location.href = "https://tishka3.gumroad.com/l/zebvt";
}
  document.getElementById("input").addEventListener("input", function() {
  let length = this.value.length;
  document.getElementById("counter").innerText = length + " / 200";
});
</script>

</body>
</html>
