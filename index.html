<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google-site-verification" content="jWItfoIhZreP-pLoRIACFyuvQxsQyKg0EkaxWfJFKsY" />
<title>Remove Extra Spaces Online | Clean Text Tool</title>

<style>
body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
textarea { width: 100%; height: 150px; margin-bottom: 10px; }
button { padding: 10px; margin: 5px; }
.pro { background: black; color: white; }
</style>
</head>

<body>

<h1>Remove Extra Spaces from Text Online (Free Tool)</h1>
<p>Quickly remove extra spaces, fix formatting, and clean your text online.</p>

<textarea id="input" placeholder="Paste text here..."></textarea>
<p id="counter">0 / 200</p>

<button id="cleanBtn">Clean Text</button>
<button id="upperBtn">UPPERCASE</button>
<button id="rewriteBtn">Rewrite (PRO)</button>

<h3>Result:</h3>
<textarea id="output"></textarea>

<br><br>

<p><b>Free version:</b> 200 characters + 3 attempts. Unlock PRO for unlimited access and AI rewrite.</p>
<button class="pro" onclick="goPay()">Unlock PRO ($5)</button>

<script>
let attempts = 0;

const input = document.getElementById("input");
const output = document.getElementById("output");
const counter = document.getElementById("counter");

// счетчик
input.addEventListener("input", function() {
  counter.innerText = input.value.length + " / 200";
});

// общая проверка лимитов
function checkLimits(text) {
  attempts++;

  if (attempts > 3) {
    if (confirm("Free attempts finished. Go PRO?")) {
      goPay();
    }
    return false;
  }

  if (text.length > 200) {
    if (confirm("Limit reached. Unlock PRO for unlimited access?")) {
      goPay();
    }
    return false;
  }

  return true;
}

// CLEAN
document.getElementById("rewriteBtn").addEventListener("click", function() {
  let text = input.value;

  if (text.length < 50) {
    alert("Enter more text to rewrite.");
    return;
  }

  if (confirm("AI Rewrite is a PRO feature. Unlock now?")) {
    goPay();
  }
});
  let text = input.value;

  if (!checkLimits(text)) return;

  text = text.replace(/\s+/g, ' ').trim();
  output.value = text;
});

// UPPERCASE
document.getElementById("upperBtn").addEventListener("click", function() {
  let text = input.value;

  if (!checkLimits(text)) return;

  text = text.replace(/\s+/g, ' ').trim();
  output.value = text.toUpperCase();
});

// REWRITE (PRO)
document.getElementById("rewriteBtn").addEventListener("click", function() {
  if (confirm("Rewrite text like a human and bypass AI detection. Unlock PRO?")) {
    goPay();
  }
});

// переход на оплату
function goPay() {
  window.location.href = "https://tishka3.gumroad.com/l/zebvt";
}
</script>

</body>
</html>
